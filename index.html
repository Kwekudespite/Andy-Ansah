<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Beach Date Night Scene</title>

<style>
body{
margin:0;
overflow:hidden;
background:black;
}
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<!-- MOUSE CAMERA CONTROL -->
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>

</head>

<body>

<script>

// SCENE
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000015);


// CAMERA
const camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
);

camera.position.set(10,6,12);


// RENDERER
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);


// MOUSE CAMERA CONTROL
const controls = new THREE.OrbitControls(camera,renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;


// LIGHTING
const ambient = new THREE.AmbientLight(0xffffff,0.3);
scene.add(ambient);

const moonLight = new THREE.DirectionalLight(0xffffff,0.8);
moonLight.position.set(-30,40,-20);
scene.add(moonLight);


// GRASS FLOOR
const grass = new THREE.Mesh(
new THREE.PlaneGeometry(200,200),
new THREE.MeshPhongMaterial({color:0x0f7a0f})
);

grass.rotation.x = -Math.PI/2;
grass.position.y = -2;
scene.add(grass);


// SEA
const seaGeometry = new THREE.PlaneGeometry(200,120,80,80);

const seaMaterial = new THREE.MeshPhongMaterial({
color:0x1e90ff,
shininess:100,
specular:0xffffff,
transparent:true,
opacity:0.9
});

const sea = new THREE.Mesh(seaGeometry,seaMaterial);
sea.rotation.x = -Math.PI/2;
sea.position.set(0,-1.8,-60);
scene.add(sea);


// STARS
for(let i=0;i<900;i++){

const star = new THREE.Mesh(
new THREE.SphereGeometry(0.05),
new THREE.MeshBasicMaterial({color:0xffffff})
);

star.position.x=(Math.random()-0.5)*200;
star.position.y=Math.random()*90+10;
star.position.z=(Math.random()-0.5)*200;

scene.add(star);

}


// MOON
const moon = new THREE.Mesh(
new THREE.SphereGeometry(3,32,32),
new THREE.MeshBasicMaterial({color:0xffffcc})
);

moon.position.set(-40,40,-60);
scene.add(moon);


// PALM TREES
function createPalm(x,z){

const trunk = new THREE.Mesh(
new THREE.CylinderGeometry(0.4,0.6,8),
new THREE.MeshPhongMaterial({color:0x8b5a2b})
);

trunk.position.set(x,2,z);
scene.add(trunk);

for(let i=0;i<6;i++){

const leaf = new THREE.Mesh(
new THREE.BoxGeometry(6,0.2,1),
new THREE.MeshPhongMaterial({color:0x228b22})
);

leaf.position.set(x,6,z);
leaf.rotation.y=i*Math.PI/3;
leaf.rotation.z=0.5;

scene.add(leaf);

}

}

createPalm(-20,-40);
createPalm(20,-45);
createPalm(-30,-50);


// PATHWAY LIGHTS
for(let i=0;i<6;i++){

const base = new THREE.Mesh(
new THREE.CylinderGeometry(0.2,0.2,0.3),
new THREE.MeshPhongMaterial({color:0xaaaaaa})
);

base.position.set(0,-1.8,6-i*2);
scene.add(base);

const glow = new THREE.PointLight(0xffdd99,1,6);
glow.position.set(0,-1.3,6-i*2);
scene.add(glow);

}


// TABLE
const tableTop = new THREE.Mesh(
new THREE.BoxGeometry(6,0.4,4),
new THREE.MeshPhongMaterial({color:0x5a2d0c})
);

tableTop.position.y = 0;
scene.add(tableTop);


// TABLE LEGS
function tableLeg(x,z){

const leg = new THREE.Mesh(
new THREE.CylinderGeometry(0.2,0.2,2),
new THREE.MeshPhongMaterial({color:0x3b1f07})
);

leg.position.set(x,-1,z);
scene.add(leg);

}

tableLeg(2.7,1.7);
tableLeg(-2.7,1.7);
tableLeg(2.7,-1.7);
tableLeg(-2.7,-1.7);


// CHAIRS WITH LEGS
function createChair(x,z){

const seat = new THREE.Mesh(
new THREE.BoxGeometry(1.5,0.2,1.5),
new THREE.MeshPhongMaterial({color:0x552222})
);

seat.position.set(x,-1,z);
scene.add(seat);

const back = new THREE.Mesh(
new THREE.BoxGeometry(1.5,1.5,0.2),
new THREE.MeshPhongMaterial({color:0x552222})
);

back.position.set(x,-0.3,z-0.7);
scene.add(back);


function leg(lx,lz){

const leg = new THREE.Mesh(
new THREE.CylinderGeometry(0.08,0.08,1),
new THREE.MeshPhongMaterial({color:0x331111})
);

leg.position.set(x+lx,-1.5,z+lz);
scene.add(leg);

}

leg(0.6,0.6);
leg(-0.6,0.6);
leg(0.6,-0.6);
leg(-0.6,-0.6);

}

createChair(4,0);
createChair(-4,0);


// MILO TIN
const milo = new THREE.Mesh(
new THREE.CylinderGeometry(0.5,0.5,1.2,32),
new THREE.MeshPhongMaterial({color:0x006400})
);

milo.position.set(-1.5,0.9,0);
scene.add(milo);


// MILK TIN
const milk = new THREE.Mesh(
new THREE.CylinderGeometry(0.5,0.5,1.2,32),
new THREE.MeshPhongMaterial({color:0xffffff})
);

milk.position.set(1.5,0.9,0);
scene.add(milk);


// CUPS
function createCup(x){

const cup = new THREE.Mesh(
new THREE.CylinderGeometry(0.25,0.3,0.6),
new THREE.MeshPhongMaterial({color:0xffeeee})
);

cup.position.set(x,0.6,1);
scene.add(cup);

}

createCup(-0.6);
createCup(0.6);


// ANIMATION
function animate(){

requestAnimationFrame(animate);

// OCEAN WAVES
const pos = sea.geometry.attributes.position;

for(let i=0;i<pos.count;i++){

let x = pos.getX(i);
let y = pos.getY(i);

let wave =
Math.sin(x*0.3 + Date.now()*0.002) +
Math.cos(y*0.3 + Date.now()*0.002);

pos.setZ(i,wave*0.4);

}

pos.needsUpdate=true;

controls.update();

renderer.render(scene,camera);

}

animate();


// RESIZE
window.addEventListener("resize",()=>{

camera.aspect=window.innerWidth/window.innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(window.innerWidth,window.innerHeight);

});

</script>

</body>
</html>
