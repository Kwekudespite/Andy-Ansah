<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>PracticalQuiz2 Scene</title>

<style>

body{
margin:0;
overflow:hidden;
background:#202020;
}

canvas{
display:block;
}

</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>

</head>

<body>

<script>

// SCENE
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xbfd1e5);


// CAMERA
const camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
);

camera.position.set(7,6,10);


// RENDERER
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.shadowMap.enabled = true;

document.body.appendChild(renderer.domElement);


// CONTROLS
const controls = new THREE.OrbitControls(camera,renderer.domElement);


// LIGHTING
const ambient = new THREE.AmbientLight(0xffffff,0.5);
scene.add(ambient);

const light = new THREE.DirectionalLight(0xffffff,1);
light.position.set(10,15,10);
light.castShadow = true;

scene.add(light);


// FLOOR
const floor = new THREE.Mesh(

new THREE.PlaneGeometry(40,40),

new THREE.MeshPhongMaterial({color:0x888888})

);

floor.rotation.x = -Math.PI/2;
floor.position.y = -2;

floor.receiveShadow = true;

scene.add(floor);



// TABLE TOP
const tableTop = new THREE.Mesh(

new THREE.BoxGeometry(6,0.4,4),

new THREE.MeshPhongMaterial({color:0x8b4513})

);

tableTop.position.y = 0;
tableTop.castShadow = true;

scene.add(tableTop);



// TABLE LEGS
function tableLeg(x,z){

const leg = new THREE.Mesh(

new THREE.CylinderGeometry(0.2,0.2,2),

new THREE.MeshPhongMaterial({color:0x5c4033})

);

leg.position.set(x,-1,z);
leg.castShadow = true;

scene.add(leg);

}

tableLeg(2.7,1.7);
tableLeg(-2.7,1.7);
tableLeg(2.7,-1.7);
tableLeg(-2.7,-1.7);




// CHAIR FUNCTION
function createChair(x,z){

// seat
const seat = new THREE.Mesh(

new THREE.BoxGeometry(1.6,0.2,1.6),

new THREE.MeshPhongMaterial({color:0x2222aa})

);

seat.position.set(x,-1,z);
seat.castShadow = true;

scene.add(seat);


// backrest
const back = new THREE.Mesh(

new THREE.BoxGeometry(1.6,1.6,0.2),

new THREE.MeshPhongMaterial({color:0x2222aa})

);

back.position.set(x,-0.2,z-0.7);
back.castShadow = true;

scene.add(back);


// chair legs
function chairLeg(lx,lz){

const leg = new THREE.Mesh(

new THREE.CylinderGeometry(0.1,0.1,1),

new THREE.MeshPhongMaterial({color:0x111111})

);

leg.position.set(x+lx,-1.5,z+lz);
leg.castShadow = true;

scene.add(leg);

}

chairLeg(0.6,0.6);
chairLeg(-0.6,0.6);
chairLeg(0.6,-0.6);
chairLeg(-0.6,-0.6);

}

createChair(4,0);
createChair(-4,0);




// MILO TIN
const milo = new THREE.Mesh(

new THREE.CylinderGeometry(0.5,0.5,1.2,32),

new THREE.MeshPhongMaterial({color:0x006400})

);

milo.position.set(-1.5,0.9,0);
milo.castShadow = true;

scene.add(milo);



// MILK TIN
const milk = new THREE.Mesh(

new THREE.CylinderGeometry(0.5,0.5,1.2,32),

new THREE.MeshPhongMaterial({color:0xffffff})

);

milk.position.set(1.5,0.9,0);
milk.castShadow = true;

scene.add(milk);




// CUP FUNCTION
function createCup(x){

// cup body
const cup = new THREE.Mesh(

new THREE.CylinderGeometry(0.35,0.4,0.7,32),

new THREE.MeshPhongMaterial({color:0xffeeee})

);

cup.position.set(x,0.7,1);
cup.castShadow = true;

scene.add(cup);


// handle
const handle = new THREE.Mesh(

new THREE.TorusGeometry(0.2,0.05,16,100),

new THREE.MeshPhongMaterial({color:0xffeeee})

);

handle.position.set(x+0.45,0.7,1);
handle.rotation.y = Math.PI/2;

scene.add(handle);

}

createCup(-0.6);
createCup(0.6);




// PLATE DECORATION
const plate = new THREE.Mesh(

new THREE.CylinderGeometry(0.8,0.8,0.1,32),

new THREE.MeshPhongMaterial({color:0xffffff})

);

plate.position.set(0,0.4,-1);

scene.add(plate);




// ANIMATION
function animate(){

requestAnimationFrame(animate);

controls.update();

renderer.render(scene,camera);

}

animate();




// RESIZE
window.addEventListener("resize",()=>{

camera.aspect = window.innerWidth/window.innerHeight;

camera.updateProjectionMatrix();

renderer.setSize(window.innerWidth,window.innerHeight);

});

</script>

</body>

</html>
